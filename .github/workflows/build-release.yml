name: Android Build & Release CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build, Sign & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to generate meaningful release notes

      - name: Generate Version Name
        id: version
        run: |
          # Format: 1.0.YYMMDDHHMMSS in UTC
          VERSION_NAME="1.0.$(date -u +'%y%m%d%H%M%S')"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "Generated Version Name: $VERSION_NAME"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decrypt Signing Keystore & Properties
        env:
          DECRYPT_PASSWORD: ${{ secrets.SIGNING_DECRYPT_PASSWORD }}
        run: |
          if [ -z "$DECRYPT_PASSWORD" ]; then
            echo "Error: SIGNING_DECRYPT_PASSWORD secret is not configured!"
            exit 1
          fi
          
          # Decrypt release-keystore.jks
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 -in app/release-keystore.jks.enc -out app/release-keystore.jks -pass pass:"$DECRYPT_PASSWORD"
          
          # Decrypt keystore.properties
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 100000 -in keystore.properties.enc -out keystore.properties -pass pass:"$DECRYPT_PASSWORD"
          
          echo "Signing keys decrypted successfully."

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Build Signed Release APK
        run: ./gradlew assembleRelease -PversionName=${{ env.VERSION_NAME }}

      - name: Rename and Package APK
        run: |
          APK_DIR="app/build/outputs/apk/release"
          if [ -f "$APK_DIR/app-release.apk" ]; then
            mv "$APK_DIR/app-release.apk" "$APK_DIR/MTGallery-${{ env.VERSION_NAME }}.apk"
            echo "APK successfully renamed to MTGallery-${{ env.VERSION_NAME }}.apk"
          else
            echo "Error: app-release.apk not found in $APK_DIR"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: Release v${{ env.VERSION_NAME }}
          files: app/build/outputs/apk/release/MTGallery-${{ env.VERSION_NAME }}.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
